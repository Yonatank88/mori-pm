<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PM Foundations — Course</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

<header class="site">
  <div class="wrap">
    <a class="brand" href="index.html">PM Foundations</a>
    <nav class="site">
      <a href="index.html" class="active">Course</a>
      <a href="artifacts.html">Artifacts</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <h1 class="page">The Course</h1>
  <p class="lede">Program structure and weekly learning units. Click a section to expand it.</p>

  <details class="card" id="intro-card">
    <summary>Program Overview <span class="tag">curriculum &amp; meetings</span></summary>
    <div class="body md" id="intro" dir="auto">
      <p class="loading">Loading…</p>
    </div>
  </details>

  <h2 class="folder">The Units</h2>
  <div id="units"></div>
</main>

<footer class="site">
  <div class="wrap">Content is rendered live from the markdown files in this repository.</div>
</footer>

<script>
(async function () {
  const introEl = document.getElementById('intro');
  const unitsEl = document.getElementById('units');
  try {
    const res = await fetch('PM%20Foundations.md', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();

    // Split the document: everything before the first "# Unit" heading is the
    // program intro; each "# Unit ..." section becomes an expandable.
    const parts = text.split(/^(?=# Unit )/m);
    const intro = parts.shift();

    introEl.innerHTML = marked.parse(
      // Drop the top-level title (shown in the header) but keep the rest.
      intro.replace(/^# PM Foundations\s*\n/, '')
    );
    introEl.setAttribute('dir', 'auto');

    for (const section of parts) {
      const title = section.match(/^# (.+)$/m)[1];
      const body = section.replace(/^# .+$/m, '').replace(/\n---\s*$/, '');

      const details = document.createElement('details');
      details.className = 'card';
      const summary = document.createElement('summary');
      summary.textContent = title;
      const div = document.createElement('div');
      div.className = 'body md';
      div.setAttribute('dir', 'auto');
      div.innerHTML = marked.parse(body);
      details.append(summary, div);
      unitsEl.appendChild(details);
    }
  } catch (e) {
    introEl.innerHTML = '<p class="loading">Could not load the course file (' + e.message + '). If you opened this page from disk, serve it over HTTP instead.</p>';
  }
})();
</script>

</body>
</html>
